name: vMeer GSI Ultimate Slimmer

on:
  workflow_dispatch:
    inputs:
      gsi_url:
        description: 'Direct Link to GSI Image (ZIP/XZ/IMG)'
        required: true

jobs:
  build-slim-rom:
    runs-on: ubuntu-latest
    steps:
      - name: Install Advanced Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs wget xz-utils p7zip-full zip unzip erofs-utils

      - name: Download & Extract GSI
        run: |
          wget "${{ github.event.inputs.gsi_url }}" -O system_input.img.xz
          echo ">>> Extracting..."
          unzip system_input.img.xz || xz -d system_input.img.xz || echo "Already raw"
          
          SOURCE_IMG=$(ls -S *.img | head -n 1)
          echo "Source: $SOURCE_IMG"
          
          # Convert Sparse to Raw
          /usr/bin/simg2img "$SOURCE_IMG" system_raw.img || mv "$SOURCE_IMG" system_raw.img

      - name: Surgical Debloat (Supports Ext4 & EROFS)
        run: |
          mkdir -p sys_mount sys_work
          
          # Cek tipe filesystem
          FS_TYPE=$(lsblk -no FSTYPE system_raw.img || file -bL system_raw.img | awk '{print tolower($1)}')
          echo "Detected FS: $FS_TYPE"

          if [[ "$FS_TYPE" == *"erofs"* ]]; then
            echo "EROFS detected. Extracting and converting to Ext4..."
            sudo mount -t erofs -o loop system_raw.img sys_mount
            cp -a sys_mount/. sys_work/
            sudo umount sys_mount
          else
            echo "Ext4 detected. Mounting directly..."
            sudo mount -o loop system_raw.img sys_mount
            cp -a sys_mount/. sys_work/
            sudo umount sys_mount
          fi

          echo ">>> DEBLOATING IN WORKSPACE..."
          # List penghapusan pada folder kerja
          rm -rf sys_work/system/product/app/{YouTube,Maps,Gmail,Drive,CalendarGoogle}
          rm -rf sys_work/system/product/priv-app/{Velvet,Photos}
          rm -rf sys_work/system/app/Chrome
          rm -rf sys_work/system/media/audio/ringtones/*
          
          echo ">>> INJECTING VIA BROWSER..."
          mkdir -p sys_work/system/app/ViaBrowser
          wget "https://github.com/tuyafeng/Via/raw/master/app/release/app-release.apk" -O sys_work/system/app/ViaBrowser/ViaBrowser.apk
          chmod 644 sys_work/system/app/ViaBrowser/ViaBrowser.apk

      - name: Build Final Ext4 Image
        run: |
          echo ">>> Creating Clean Ext4 Image..."
          # Hitung estimasi ukuran (size folder + 200MB buffer)
          SIZE=$(du -sk sys_work | cut -f1)
          SIZE=$((SIZE + 204800)) 
          
          # Buat image kosong
          dd if=/dev/zero of=vmeer_final.img bs=1K count=$SIZE
          mkfs.ext4 vmeer_final.img
          
          # Salin file ke image baru
          mkdir final_mount
          sudo mount -o loop vmeer_final.img final_mount
          sudo cp -a sys_work/. final_mount/
          sudo umount final_mount

      - name: Optimize & Compress
        run: |
          # Optimasi filesystem
          sudo e2fsck -fy vmeer_final.img
          sudo resize2fs -M vmeer_final.img
          sudo tune2fs -O read-only vmeer_final.img
          
          mv vmeer_final.img vmeer_u14_slim.bin
          7z a -mx=9 vmeer_u14_slim.7z vmeer_u14_slim.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vMeer-GSI-Slim-7z
          path: vmeer_u14_slim.7z
          retention-days: 3
          
