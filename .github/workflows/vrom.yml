name: vMeer GSI Slimmer (Official GMS + Via Browser)

on:
  workflow_dispatch:
    inputs:
      gsi_url:
        description: 'Direct Link to GSI Image (ZIP/XZ/IMG)'
        required: true
        default: ''

jobs:
  build-slim-rom:
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Tools
        run: |
          sudo apt-get update
          # Menggunakan android-sdk-libsparse-utils untuk Ubuntu 24.04+
          sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs wget xz-utils p7zip-full zip unzip

      - name: Download & Extract GSI
        run: |
          wget "${{ github.event.inputs.gsi_url }}" -O system_input.img.xz
          
          echo ">>> Mendeteksi format file dan mengekstrak..."
          # Mencoba ekstrak sebagai ZIP, jika gagal coba XZ
          unzip system_input.img.xz || xz -d system_input.img.xz || echo "File mungkin sudah format mentah (.img)"
          
          # Mencari file .img terbesar sebagai source sistem
          SOURCE_IMG=$(ls -S *.img | head -n 1)
          echo "Source image ditemukan: $SOURCE_IMG"
          
          # Konversi dari Sparse ke Raw agar bisa di-mount
          /usr/bin/simg2img "$SOURCE_IMG" system_raw.img || mv "$SOURCE_IMG" system_raw.img

      - name: Surgical Debloat & Browser Injection
        run: |
          mkdir -p sys_mount
          # Mount image sebagai loop device
          sudo mount -o loop system_raw.img sys_mount
          
          echo ">>> Menghapus Bloatware Berat (Play Store TETAP AMAN)..."
          # Menghapus aplikasi besar di partisi /product dan /system
          sudo rm -rf sys_mount/system/product/app/YouTube
          sudo rm -rf sys_mount/system/product/app/Maps
          sudo rm -rf sys_mount/system/product/app/Gmail
          sudo rm -rf sys_mount/system/product/app/Drive
          sudo rm -rf sys_mount/system/product/app/CalendarGoogle
          sudo rm -rf sys_mount/system/product/priv-app/Velvet
          sudo rm -rf sys_mount/system/product/priv-app/Photos
          sudo rm -rf sys_mount/system/app/Chrome
          
          echo ">>> Menyuntikkan Via Browser (Super Ringan)..."
          sudo mkdir -p sys_mount/system/app/ViaBrowser
          sudo wget "https://github.com/tuyafeng/Via/raw/master/app/release/app-release.apk" -O sys_mount/system/app/ViaBrowser/ViaBrowser.apk
          sudo chmod 644 sys_mount/system/app/ViaBrowser/ViaBrowser.apk
          
          echo ">>> Membersihkan Residu Audio & Wallpaper..."
          sudo rm -rf sys_mount/system/media/audio/ringtones/*
          sudo rm -rf sys_mount/system/media/audio/notifications/*
          sudo rm -rf sys_mount/system/product/media/wallpaper/*
          
          # Hapus cache residu
          sudo find sys_mount/system -name "*.odex" -delete
          sudo find sys_mount/system -name "*.vdex" -delete
          
          echo ">>> Debloat Selesai. Melepas mount..."
          sudo umount sys_mount

      - name: Optimize & Shrink Filesystem
        run: |
          # Perbaiki struktur filesystem setelah bedah
          sudo e2fsck -fy system_raw.img
          # Perkecil ukuran image ke batas minimum isi data agar hemat ruang
          sudo resize2fs -M system_raw.img
          # Kunci image menjadi Read-Only di level atribut filesystem
          sudo tune2fs -O read-only system_raw.img
          mv system_raw.img vmeer_u14_slim.bin

      - name: Compress to 7-Zip (Ultra)
        run: |
          # Menggunakan 7z dengan kompresi level 9 (LZMA2)
          7z a -mx=9 vmeer_u14_slim.7z vmeer_u14_slim.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vMeer-GSI-Slim-ROM
          path: vmeer_u14_slim.7z
          retention-days: 5
