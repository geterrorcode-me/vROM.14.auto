name: vMeer GSI Ultimate (Fixed Permissions)

on:
  workflow_dispatch:
    inputs:
      gsi_url:
        description: 'Direct Link to GSI Image (ZIP/XZ/IMG)'
        required: true

jobs:
  build-slim-rom:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk-libsparse-utils e2fsprogs wget xz-utils \
            p7zip-full zip unzip erofs-utils fuse3 curl

      - name: Download & Extract GSI
        run: |
          wget -q --show-progress "${{ github.event.inputs.gsi_url }}" -O input_file
          echo ">>> Mendeteksi format..."
          FTYPE=$(file -b input_file)
          if [[ "$FTYPE" == *"Zip"* ]]; then
            unzip -o input_file
          elif [[ "$FTYPE" == *"XZ"* || "$FTYPE" == *"xz"* ]]; then
            mv input_file input_file.xz
            xz -d -T0 input_file.xz
          else
            mv input_file system_raw.img
          fi
          SOURCE_IMG=$(ls -S *.img 2>/dev/null | head -n 1)
          if [ -n "$SOURCE_IMG" ] && [ "$SOURCE_IMG" != "system_raw.img" ]; then
            mv "$SOURCE_IMG" system_raw.img
          fi

      - name: Process, Debloat & Inject
        run: |
          set -e
          mkdir -p sys_mount sys_work

          # [span_6](start_span)Konversi Sparse Image[span_6](end_span)
          if file -bL system_raw.img | grep -qi "sparse"; then
              simg2img system_raw.img system_raw.img.raw
              rm -f system_raw.img
              mv system_raw.img.raw system_raw.img
          fi

          SUCCESS=false
          [span_7](start_span)if file -bL system_raw.img | grep -qi "erofs"; then[span_7](end_span)
              echo ">>> EROFS detected"
              sudo erofsfuse -o ro system_raw.img sys_mount && {
                [span_8](start_span)sudo cp -a sys_mount/. sys_work/ # Gunakan sudo untuk copy[span_8](end_span)
                [span_9](start_span)sudo fusermount -u sys_mount 2>/dev/null || sudo umount -l sys_mount[span_9](end_span)
                SUCCESS=true
              } || {
                [span_10](start_span)sudo fsck.erofs --extract=sys_work --no-preserve system_raw.img && SUCCESS=true[span_10](end_span)
              }
          else
              [span_11](start_span)echo ">>> Ext4 detected"[span_11](end_span)
              for opt in "loop,ro,noload" "loop,ro" "loop"; do
                [span_12](start_span)if sudo mount -t ext4 -o $opt system_raw.img sys_mount 2>/dev/null; then[span_12](end_span)
                  [span_13](start_span)sudo cp -a sys_mount/. sys_work/ # Gunakan sudo untuk copy[span_13](end_span)
                  sudo umount -l sys_mount
                  SUCCESS=true
                  break
                fi
              done
          fi

          [span_14](start_span)if [ "$SUCCESS" = false ]; then[span_14](end_span)
              [span_15](start_span)sudo debugfs -R "rdump / sys_work" system_raw.img 2>/dev/null || exit 1[span_15](end_span)
          fi

          # [span_16](start_span)Validasi folder system[span_16](end_span)
          [ ! -d "sys_work/system" ] && { exit 1; }

          # [span_17](start_span)Debloat & Optimasi VM[span_17](end_span)
          sudo rm -rf sys_work/system/product/app/{YouTube*,Maps*,Gmail*,Drive*,Photos*,Chrome*} || true
          
          # Injeksi build.prop (Indentasi dihapus agar valid)
          sudo tee -a sys_work/system/build.prop > /dev/null <<EOT
          persist.sys.freeform_support=true
          persist.multi_window.enable=true
          ro.sf.lcd_density=160
          persist.sys.cursor.enable=true
          ro.input.mouse.enabled=1
          ro.config.show_ime=true
          qemu.hw.mainkeys=0
          ro.boot.selinux=permissive
          EOT

          

           

          
          # [span_18](start_span)Inject Apps[span_18](end_span)
          sudo mkdir -p sys_work/system/app/ViaBrowser
          sudo wget -q "https://github.com/tuyafeng/Via/raw/master/app/release/app-release.apk" -O sys_work/system/app/ViaBrowser/ViaBrowser.apk
          sudo chmod 644 sys_work/system/app/ViaBrowser/ViaBrowser.apk
          MAGISK_URL=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest | grep -o 'https://.*Magisk.*apk' | head -n 1)
          sudo mkdir -p sys_work/system/priv-app/Magisk
          sudo wget -q "$MAGISK_URL" -O sys_work/system/priv-app/Magisk/Magisk.apk

      - name: Rebuild Image
        run: |
          SIZE_KB=$(sudo du -sk sys_work | cut -f1)
          SIZE_KB=$((SIZE_KB + 512000))
          dd if=/dev/zero of=vmeer_final.img bs=1K count=$SIZE_KB status=none
          mkfs.ext4 -F -L "system" vmeer_final.img
          mkdir -p final_mount
          sudo mount -o loop vmeer_final.img final_mount
          sudo cp -a sys_work/. final_mount/
          sudo umount final_mount
          sudo e2fsck -fy vmeer_final.img
          sudo resize2fs -M vmeer_final.img
          sudo tune2fs -c 0 -i 0 -O read-only vmeer_final.img
          mv vmeer_final.img vmeer_u14_slim.img

      - name: Compress & Upload
        run: |
          7z a -mx=9 vmeer_u14_slim.7z vmeer_u14_slim.img

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vMeer-GSI-VM-Final
          path: vmeer_u14_slim.7z
          
