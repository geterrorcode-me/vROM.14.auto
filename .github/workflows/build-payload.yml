name: VMeer Container Preparator
on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'Direct Link ke ROM (7z/zip/img)'
        required: true
        default: 'https://example.com/vmeer_u14_slim.7z'

jobs:
  process-rom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y 7z tar xz-utils

      - name: Download ROM
        run: |
          echo "Downloading from ${{ github.event.inputs.rom_url }}"
          curl -L -o raw_rom.7z "${{ github.event.inputs.rom_url }}"

      - name: Decompress & Strip (The Surgery)
        run: |
          mkdir -p raw_folder
          mkdir -p vmeer_rootfs
          
          # Ekstrak 7z asli
          7z x raw_rom.7z -oraw_folder
          
          # Cari folder system dan vendor di hasil ekstrak
          # Kita hanya ambil yang dibutuhkan untuk Container
          cp -r raw_folder/system vmeer_rootfs/ 2>/dev/null || true
          cp -r raw_folder/vendor vmeer_rootfs/ 2>/dev/null || true
          
          # OPTIMALISASI: Buang bloatware agar payload ringan
          cd vmeer_rootfs
          rm -rf system/media/* # Hapus boot animation & ringtones
          rm -rf system/tts/* # Hapus data text-to-speech
          rm -rf system/fonts/NotoColorEmoji.ttf # Hapus emoji (opsional, hemat 20MB)
          
          # Buat file identitas container
          echo "container_version=1.0.0" > container.prop
          echo "build_date=$(date)" >> container.prop

      - name: Create Container Payload (.tar.xz)
        run: |
          # Menggunakan tar.xz karena kompresinya sangat kuat (bisa mengecilkan 1GB ke ~200MB)
          tar -cJf vmeer_payload.tar.xz -C vmeer_rootfs .

      - name: Upload Finished Payload
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-container-payload
          path: vmeer_payload.tar.xz
          retention-days: 7
          
